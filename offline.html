<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5faf8">
    <title>TrueView Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #f5faf8;
        color: #142321;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      }
      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid rgba(20, 35, 33, 0.12);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.76);
        padding: 22px;
        box-shadow: 0 18px 50px rgba(20, 35, 33, 0.1);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: #64736f;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TrueView is offline</h1>
      <p>The field app shell is cached. Reopen the app from the Home Screen or refresh once the cached files are available.</p>
    </main>
  </body>
</html>
